<!--JS code for showing or hiding the WB contact details. The logic is as follows:
What your code is doing (plain explanation)
const wbDetails = document.getElementById("wbDetails");
- Looks through the page (DOM) and grabs the element with id="wbDetails"
- Stores it in a variable so you can control it later


document.getElementById("option2").addEventListener("click", function() {
- Finds the button with id="option2"
- Listens for a click
- When clicked → run the function


wbDetails.style.display = "block";
- Changes the CSS of that hidden section
- Makes it visible

Same logic here:

document.getElementById("option3").addEventListener("click", function() {
    wbDetails.style.display = "block";
});
-->
<script>
    const wbDetails = document.getElementById("wbDetails");

    document.getElementById("option2").addEventListener("click", function() {
        wbDetails.style.display = "block";
    });

    document.getElementById("option3").addEventListener("click", function() {
        wbDetails.style.display = "block";
    });
</script>
